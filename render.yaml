services:
  - type: web
    name: luxury-hotel-booking-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: WHATSAPP_PROVIDER
        value: dry_run
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: WHATSAPP_DEFAULT_COUNTRY_CODE
        value: "91"
      - key: ADMIN_WHATSAPP_NUMBERS
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: NOTIFICATION_SCHEDULER_ENABLED
        value: "true"
      - key: NOTIFICATION_SCHEDULER_INTERVAL_SECONDS
        value: "60"
      - key: PAYMENT_EXPIRATION_HOURS
        value: "24"
